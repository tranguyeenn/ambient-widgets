<!doctype html>
<!--
  Shell document loaded by the WebView. Tauri injects the runtime; Vite replaces the script
  with bundled JS in production. The single <div id="root"> is where React mounts (see main.tsx).
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <!-- Mobile-friendly scaling; still useful if the window is resized small. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ambient Widgets</title>
  </head>

  <body>
    <div id="root"></div>
    <!-- `type="module"`: enables ES imports; Vite transforms TS/TSX on the fly in dev. -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
